<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="whatsappGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366"/>
      <stop offset="100%" style="stop-color:#128C7E"/>
    </linearGradient>
    <linearGradient id="wahaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="apGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
    <linearGradient id="gmailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA4335"/>
      <stop offset="100%" style="stop-color:#C5221F"/>
    </linearGradient>
    <linearGradient id="groqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="hfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9D00"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#25D366"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA4335"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#ffffff08"/>
  </pattern>
  <rect width="900" height="560" fill="url(#dots)" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" letter-spacing="2">WhatsApp → Gmail Bot — Architecture</text>
  <text x="450" y="56" text-anchor="middle" fill="#ffffff50" font-size="11">Powered by WAHA · Activepieces · Groq AI · HuggingFace</text>
  <line x1="200" y1="65" x2="700" y2="65" stroke="#ffffff15" stroke-width="1"/>

  <!-- ===== USER (WhatsApp) ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="130" height="80" rx="14" fill="url(#whatsappGrad)" opacity="0.95"/>
  </g>
  <text x="95" y="133" text-anchor="middle" fill="#fff" font-size="22">💬</text>
  <text x="95" y="153" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">User</text>
  <text x="95" y="168" text-anchor="middle" fill="#ffffff99" font-size="10">WhatsApp</text>

  <!-- ===== WAHA on HuggingFace ===== -->
  <g filter="url(#shadow)">
    <rect x="220" y="80" width="160" height="120" rx="14" fill="url(#wahaGrad)" opacity="0.95"/>
  </g>
  <text x="300" y="115" text-anchor="middle" fill="#fff" font-size="20">🤖</text>
  <text x="300" y="137" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">WAHA</text>
  <text x="300" y="154" text-anchor="middle" fill="#ffffff99" font-size="10">WhatsApp HTTP API</text>
  <rect x="240" y="163" width="120" height="22" rx="8" fill="#FF9D0030"/>
  <text x="300" y="178" text-anchor="middle" fill="#FF9D00" font-size="9" font-weight="600">🤗 HuggingFace Space</text>

  <!-- ===== ACTIVEPIECES ===== -->
  <g filter="url(#shadow)">
    <rect x="360" y="170" width="180" height="220" rx="14" fill="#1e1e3a" stroke="#7C3AED" stroke-width="1.5" opacity="0.98"/>
  </g>
  <text x="450" y="198" text-anchor="middle" fill="#9333EA" font-size="11" font-weight="700" letter-spacing="1">ACTIVEPIECES FLOW</text>
  
  <!-- Step boxes inside AP -->
  <rect x="378" y="208" width="144" height="28" rx="7" fill="#7C3AED30"/>
  <text x="450" y="227" text-anchor="middle" fill="#c4b5fd" font-size="10">① Filter Message</text>

  <rect x="378" y="244" width="144" height="28" rx="7" fill="#7C3AED30"/>
  <text x="450" y="263" text-anchor="middle" fill="#c4b5fd" font-size="10">② State Machine (Store)</text>

  <rect x="378" y="280" width="144" height="28" rx="7" fill="#7C3AED30"/>
  <text x="450" y="299" text-anchor="middle" fill="#c4b5fd" font-size="10">③ Send WhatsApp Reply</text>

  <rect x="378" y="316" width="144" height="28" rx="7" fill="#F59E0B30"/>
  <text x="450" y="335" text-anchor="middle" fill="#FCD34D" font-size="10">④ Groq AI (Formalize)</text>

  <rect x="378" y="352" width="144" height="28" rx="7" fill="#7C3AED30"/>
  <text x="450" y="371" text-anchor="middle" fill="#c4b5fd" font-size="10">⑤ Download Attachment</text>

  <!-- ===== GROQ AI ===== -->
  <g filter="url(#shadow)">
    <rect x="590" y="290" width="130" height="75" rx="14" fill="url(#groqGrad)" opacity="0.95"/>
  </g>
  <text x="655" y="320" text-anchor="middle" fill="#fff" font-size="20">⚡</text>
  <text x="655" y="340" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Groq AI</text>
  <text x="655" y="356" text-anchor="middle" fill="#ffffff99" font-size="10">LLaMA 3.3 70B</text>

  <!-- ===== GMAIL ===== -->
  <g filter="url(#shadow)">
    <rect x="590" y="390" width="130" height="75" rx="14" fill="url(#gmailGrad)" opacity="0.95"/>
  </g>
  <text x="655" y="420" text-anchor="middle" fill="#fff" font-size="20">📧</text>
  <text x="655" y="440" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Gmail</text>
  <text x="655" y="456" text-anchor="middle" fill="#ffffff99" font-size="10">Send Email + Attachment</text>

  <!-- ===== STORE ===== -->
  <g filter="url(#shadow)">
    <rect x="590" y="170" width="130" height="75" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  </g>
  <text x="655" y="200" text-anchor="middle" fill="#38bdf8" font-size="20">🗄️</text>
  <text x="655" y="220" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">AP Store</text>
  <text x="655" y="236" text-anchor="middle" fill="#ffffff99" font-size="10">Session State</text>

  <!-- ===== SWAGGER ===== -->
  <g filter="url(#shadow)">
    <rect x="220" y="420" width="160" height="70" rx="14" fill="#1e293b" stroke="#85efac" stroke-width="1.5"/>
  </g>
  <text x="300" y="448" text-anchor="middle" fill="#85efac" font-size="18">📋</text>
  <text x="300" y="466" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Swagger UI</text>
  <text x="300" y="482" text-anchor="middle" fill="#ffffff99" font-size="10">WAHA Config & Test</text>

  <!-- ===== ARROWS ===== -->
  <!-- User → WAHA -->
  <line x1="162" y1="140" x2="218" y2="140" stroke="#25D366" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>
  <text x="190" y="133" text-anchor="middle" fill="#25D366" font-size="8">msg</text>

  <!-- WAHA → Activepieces (webhook) -->
  <line x1="380" y1="140" x2="450" y2="170" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="148" text-anchor="middle" fill="#818cf8" font-size="8">webhook</text>

  <!-- Activepieces → WAHA reply -->
  <line x1="360" y1="299" x2="300" y2="200" stroke="#25D366" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="4,3"/>
  <text x="318" y="245" text-anchor="middle" fill="#25D366" font-size="8" transform="rotate(-35,318,245)">reply</text>

  <!-- Activepieces → Store -->
  <line x1="540" y1="230" x2="588" y2="207" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="565" y="213" text-anchor="middle" fill="#38bdf8" font-size="8">state</text>

  <!-- Activepieces → Groq -->
  <line x1="540" y1="334" x2="588" y2="327" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="563" y="323" text-anchor="middle" fill="#F59E0B" font-size="8">formalize</text>

  <!-- Groq → Gmail -->
  <line x1="655" y1="365" x2="655" y2="388" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="670" y="380" fill="#EA4335" font-size="8">email body</text>

  <!-- Activepieces → Gmail -->
  <line x1="540" y1="370" x2="588" y2="410" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)" stroke-dasharray="4,3"/>
  <text x="555" y="400" fill="#EA4335" font-size="8">send</text>

  <!-- Swagger → WAHA -->
  <line x1="300" y1="420" x2="300" y2="202" stroke="#85efac" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="280" y="320" fill="#85efac" font-size="8" transform="rotate(-90,280,320)">configure</text>

  <!-- Legend -->
  <rect x="30" y="490" width="840" height="55" rx="10" fill="#ffffff06" stroke="#ffffff10" stroke-width="1"/>
  <text x="50" y="510" fill="#ffffff60" font-size="10" font-weight="600">LEGEND</text>
  <line x1="110" y1="506" x2="145" y2="506" stroke="#25D366" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="150" y="510" fill="#ffffff80" font-size="9">WhatsApp msg</text>
  <line x1="240" y1="506" x2="275" y2="506" stroke="#4F46E5" stroke-width="2"/>
  <text x="280" y="510" fill="#ffffff80" font-size="9">Webhook trigger</text>
  <line x1="375" y1="506" x2="410" y2="506" stroke="#F59E0B" stroke-width="2"/>
  <text x="415" y="510" fill="#ffffff80" font-size="9">AI processing</text>
  <line x1="490" y1="506" x2="525" y2="506" stroke="#EA4335" stroke-width="2"/>
  <text x="530" y="510" fill="#ffffff80" font-size="9">Email send</text>
  <line x1="595" y1="506" x2="630" y2="506" stroke="#38bdf8" stroke-width="2"/>
  <text x="635" y="510" fill="#ffffff80" font-size="9">State storage</text>

  <text x="50" y="535" fill="#ffffff40" font-size="9">User sends WhatsApp msg → WAHA fires webhook → Activepieces filters &amp; processes → Groq formalizes → Gmail sends with attachment → User gets confirmation</text>
</svg>
